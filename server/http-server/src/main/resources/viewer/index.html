<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>axp viewer — Android XML Previewer</title>
  <style>
    /*
      Week 1 D5 — minimal styles. Material 3 dark surface 풍.
      Week 5 D24 에서 디바이스 드롭다운 / 테마 토글 / 에러 배지 / fallback mode 표시 추가.
    */
    :root {
      --bg: #1f1f1f;
      --surface: #2b2a30;
      --on-surface: #e3e1e6;
      --primary: #d0bcff;
      --on-surface-muted: #c9c5d0;
      --accent: #6750a4;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--on-surface);
      font-family: -apple-system, "Segoe UI", Roboto, "Noto Sans KR", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    header {
      padding: 16px 20px;
      border-bottom: 1px solid #3a3940;
      display: flex; align-items: center; gap: 16px;
    }
    header h1 {
      font-size: 16px; font-weight: 600; margin: 0;
    }
    header .meta {
      font-size: 12px; color: var(--on-surface-muted);
    }
    header .badge {
      margin-left: auto;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      background: var(--accent);
      color: white;
    }
    main {
      display: grid;
      grid-template-columns: minmax(280px, 360px) 1fr;
      gap: 24px;
      padding: 24px;
    }
    aside {
      background: var(--surface);
      border-radius: 12px;
      padding: 16px;
    }
    aside h2 { font-size: 13px; font-weight: 700; margin: 0 0 8px 0; color: var(--primary); }
    aside ul { list-style: none; padding: 0; margin: 0; font-size: 13px; line-height: 1.6; }
    aside code { font-family: ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace; }
    .preview-frame {
      background: var(--surface);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
    }
    .preview-frame img {
      max-width: 100%;
      max-height: 80vh;
      border-radius: 6px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .status {
      font-family: ui-monospace, monospace;
      font-size: 11px;
      color: var(--on-surface-muted);
      padding: 8px 12px;
      background: #131316;
      border-radius: 6px;
      margin-top: 8px;
      min-height: 24px;
    }
  </style>
</head>
<body>
  <header>
    <h1>axp · Android XML Previewer</h1>
    <span class="meta">Week 1 D5 — minimal viewer</span>
    <span class="badge">L1 placeholder</span>
  </header>
  <main>
    <aside>
      <h2>Layout</h2>
      <ul>
        <li>file: <code id="layoutPath">activity_basic.xml</code></li>
        <li>device: <code>phone_normal</code> (720×1280, xhdpi)</li>
        <li>mode: <code>L1 layoutlib</code> (placeholder)</li>
      </ul>
      <h2 style="margin-top:18px">SSE</h2>
      <ul>
        <li>endpoint: <code>/api/events</code></li>
        <li>state: <span id="sseState">connecting…</span></li>
        <li>last event: <span id="sseLastEvent">—</span></li>
      </ul>
      <div class="status" id="statusBar">init</div>
    </aside>
    <section class="preview-frame">
      <img id="previewImg" alt="loading…" />
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
